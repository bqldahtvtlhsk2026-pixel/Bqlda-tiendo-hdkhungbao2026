<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VTNet – He thong quan tri tien do HD khung 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#eef2f7;min-height:100vh;color:#1a2236}
.top-bar{background:#1F4E79;color:#fff;padding:12px 20px;display:flex;align-items:center;gap:12px}
.lg{width:34px;height:34px;background:#dc2626;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:20px;color:#fff;flex-shrink:0}
.top-bar h1{font-size:15px;font-weight:600;line-height:1.2}
.top-bar p{font-size:11px;opacity:.72;margin-top:1px}
.dbar{background:#2E75B6;color:#fff;padding:6px 20px;font-size:11px;display:flex;gap:18px;flex-wrap:wrap}
.dbar b{color:#FFD966}
.tabs{padding:0 20px;display:flex;gap:2px;background:#fff;border-bottom:1px solid #e0e8f0;overflow-x:auto}
.tab{padding:13px 18px;border:none;background:transparent;color:#666;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500;border-bottom:3px solid transparent;white-space:nowrap;transition:all .15s}
.tab.active{color:#1F4E79;border-bottom-color:#1F4E79;font-weight:700}
.tab .badge{display:inline-block;background:#ef4444;color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;margin-left:5px;font-weight:700}
.bar2{padding:8px 20px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;background:#f8fafc;border-bottom:1px solid #eef2f7}
.sdot{width:8px;height:8px;border-radius:50%;background:#10b981;display:inline-block;margin-right:4px}
.sdot.spin{background:#f59e0b}.sdot.err{background:#ef4444}
.slbl{font-size:11px;color:#666}
.rbtn{padding:4px 12px;border-radius:20px;border:1px solid #ccc;background:#fff;font-size:11px;cursor:pointer;font-family:inherit}
.rbtn:hover{background:#f0f0f0}
select.pf{margin-left:auto;padding:4px 12px;border-radius:20px;border:1px solid #ccc;background:#fff;font-size:12px;font-family:inherit}
.view{padding:16px 20px 40px;max-width:1200px;margin:0 auto}
.hidden{display:none}

/* Cards */
.card{background:#fff;border:1px solid #dde6f0;border-radius:10px;margin-bottom:10px;overflow:hidden}
.card:hover{box-shadow:0 2px 12px rgba(31,78,121,.08)}
.ch{display:flex;align-items:center;gap:8px;padding:11px 16px;cursor:pointer;background:#f6f9fc}
.ch.open{border-bottom:1px solid #dde6f0}
.kvb{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;flex-shrink:0}
.kv1{background:#B5D4F4;color:#0C447C}.kv2{background:#C0DD97;color:#27500A}
.pnm{font-size:14px;font-weight:600;flex:1}
.utime{font-size:10px;color:#ccc;margin-right:4px}
.spill{font-size:10px;padding:2px 9px;border-radius:10px;font-weight:600}
.pn{background:#f0f0f0;color:#999}.pw{background:#FFF3CD;color:#856404}.pd{background:#D4EDDA;color:#155724}
.caret{font-size:11px;color:#ccc;transition:transform .2s}.caret.open{transform:rotate(180deg)}
.cb{display:none;padding:16px}.cb.open{display:block}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.sb{background:#f8f9fb;border-radius:8px;padding:11px 13px;border:1px solid #e8edf2}
.sb.done{background:#f0faf4;border-color:#a8d8b3}
.sn{font-size:10px;font-weight:700;color:#2E75B6;text-transform:uppercase;letter-spacing:.05em}
.st{font-size:12px;font-weight:600;margin:3px 0 9px}
.sb select,.sb input[type=date]{width:100%;margin-bottom:5px;font-size:12px;padding:5px 8px;border:1px solid #ccc;border-radius:6px;font-family:inherit;background:#fff}
.ns{margin-top:13px}.ns label{font-size:11px;font-weight:600;color:#777;display:block;margin-bottom:4px}
.ns textarea,.ns input{width:100%;font-size:12px;padding:7px 10px;border:1px solid #ccc;border-radius:6px;font-family:inherit;margin-bottom:8px}
.ns textarea{min-height:46px;resize:vertical}
.subhead{font-size:11px;font-weight:700;color:#1F4E79;text-transform:uppercase;letter-spacing:.06em;margin:14px 0 8px;padding-top:12px;border-top:1px dashed #dde6f0}
.sr{display:flex;align-items:center;gap:10px;margin-top:10px}
.svbtn{padding:8px 20px;border-radius:7px;background:#1F4E79;color:#fff;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.svbtn:hover{background:#2E75B6}.svbtn:disabled{opacity:.45}
.ok{font-size:11px;color:#155724;font-weight:600;display:none}

/* Dashboard */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px}
.kpi{background:#fff;border-radius:10px;padding:16px 18px;border:1px solid #e0e8f0;position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:#2E75B6}
.kpi.green::after{background:#10b981}.kpi.amber::after{background:#f59e0b}.kpi.red::after{background:#ef4444}
.kpi .n{font-size:30px;font-weight:800;line-height:1}
.kpi.green .n{color:#059669}.kpi.amber .n{color:#d97706}.kpi.red .n{color:#dc2626}.kpi .n{color:#1F4E79}
.kpi .l{font-size:11px;color:#888;margin-top:4px;line-height:1.3}
.kpi .pct{font-size:11px;color:#888;margin-top:6px}

.panel{background:#fff;border-radius:10px;border:1px solid #e0e8f0;padding:18px 20px;margin-bottom:16px}
.panel h3{font-size:14px;font-weight:700;color:#1F4E79;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.panel h3 .ic{font-size:16px}

/* Countdown */
.countdown{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.cd-box{text-align:center;background:#1F4E79;color:#fff;border-radius:10px;padding:14px 22px;min-width:90px}
.cd-box.urgent{background:#dc2626}
.cd-box .num{font-size:40px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.cd-box .unit{font-size:11px;opacity:.8;margin-top:3px;text-transform:uppercase;letter-spacing:.1em}
.cd-info{flex:1;min-width:200px}
.cd-info .big{font-size:18px;font-weight:700;color:#1F4E79}
.cd-info .small{font-size:12px;color:#888;margin-top:3px}

/* Progress bars by step */
.stepbar{margin-bottom:12px}
.stepbar .top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.stepbar .top b{font-weight:600;color:#444}
.stepbar .top span{color:#888}
.stepbar .track{height:14px;background:#eef2f7;border-radius:7px;overflow:hidden;position:relative}
.stepbar .fill{height:100%;border-radius:7px;background:linear-gradient(90deg,#2E75B6,#22d3ee);transition:width .5s;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;color:#fff;font-size:9px;font-weight:700}

/* At-risk list */
.risk-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:8px;margin-bottom:6px;background:#fff5f5;border:1px solid #fecaca}
.risk-item.warn{background:#fffbeb;border-color:#fde68a}
.risk-item .code{font-weight:700;font-size:13px;color:#dc2626;min-width:120px}
.risk-item.warn .code{color:#d97706}
.risk-item .desc{flex:1;font-size:12px;color:#666}
.risk-item .days{font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px;background:#dc2626;color:#fff}
.risk-item.warn .days{background:#f59e0b}
.risk-empty{text-align:center;padding:24px;color:#10b981;font-size:13px;font-weight:600}

/* KV comparison donut */
.kv-compare{display:flex;gap:24px;align-items:center;flex-wrap:wrap}
.donut{position:relative;width:140px;height:140px;flex-shrink:0}
.donut svg{transform:rotate(-90deg)}
.donut .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.donut .center .big{font-size:28px;font-weight:800;color:#1F4E79}
.donut .center .lbl{font-size:10px;color:#888}
.kv-legend{flex:1;min-width:180px}
.kv-legend .item{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:13px}
.kv-legend .item .sw{width:14px;height:14px;border-radius:4px;flex-shrink:0}
.kv-legend .item .nm{flex:1;color:#444}
.kv-legend .item .vl{font-weight:700;color:#1F4E79}

/* Dashboard table */
.dtw{overflow-x:auto;border-radius:10px;border:1px solid #dde6f0;background:#fff}
table{width:100%;border-collapse:collapse;font-size:11px;min-width:820px}
thead tr{background:#1F4E79}
th{padding:9px 8px;color:#fff;font-weight:600;text-align:center;white-space:nowrap}
th:first-child{text-align:left;padding-left:14px}
td{padding:7px 8px;border-bottom:1px solid #f0f4f8;text-align:center;vertical-align:middle}
td:first-child{text-align:left;padding-left:14px;font-weight:600}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f7fafd}
.tp{display:inline-block;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:600}
.tn{background:#f0f0f0;color:#999}.td2{background:#FFF3CD;color:#856404}.tk{background:#D4EDDA;color:#155724}
.tdt{font-size:10px;color:#bbb;display:block;margin-top:1px}
.pw2{display:inline-flex;align-items:center;gap:5px}
.pb{width:56px;height:5px;border-radius:3px;background:#e0e8f0}
.pf2{height:100%;border-radius:3px;background:#2E75B6}
.pc{font-size:10px;color:#185FA5;font-weight:600;min-width:28px}

/* Emergency */
.emg-banner{background:linear-gradient(135deg,#7f1d1d,#b91c1c);color:#fff;border-radius:10px;padding:18px 22px;margin-bottom:16px;display:flex;align-items:center;gap:16px}
.emg-banner .ic{font-size:36px}
.emg-banner .txt h3{font-size:17px;font-weight:800;margin-bottom:3px}
.emg-banner .txt p{font-size:12px;opacity:.9}
.emg-toggle{margin-left:auto;display:flex;align-items:center;gap:8px}
.emg-prov-select{padding:8px 14px;border-radius:8px;border:none;font-size:13px;font-family:inherit;font-weight:600}
.contractor-card{background:#fff;border:1px solid #e0e8f0;border-radius:10px;padding:0;margin-bottom:10px;overflow:hidden}
.cc-head{background:#fef2f2;padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #fecaca}
.cc-head .kvb{flex-shrink:0}
.cc-head .nm{font-weight:700;font-size:14px;flex:1}
.cc-head .ready{font-size:10px;font-weight:700;padding:3px 10px;border-radius:12px;background:#10b981;color:#fff}
.cc-head .ready.no{background:#9ca3af}
.cc-body{padding:14px 16px}
.cc-row{display:flex;gap:10px;margin-bottom:8px;font-size:12px}
.cc-row .lbl{color:#888;min-width:130px}
.cc-row .val{font-weight:600;color:#333;flex:1}
.cc-row .val a{color:#2E75B6;text-decoration:none}
.cc-phone{font-family:monospace;font-size:15px;font-weight:700;color:#dc2626}

.empty-state{text-align:center;padding:50px 20px;color:#999}
.empty-state .ic{font-size:48px;margin-bottom:12px;opacity:.5}
.empty-state p{font-size:14px}

/* Export buttons */
.export-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.ebtn{padding:8px 16px;border-radius:8px;border:1px solid #2E75B6;background:#fff;color:#2E75B6;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.ebtn:hover{background:#2E75B6;color:#fff}
</style>
</head>
<body>

<div id="app">
  <div class="top-bar">
    <div class="lg">V</div>
    <div>
      <h1>Hệ thống quản trị tiến độ ký HĐ khung củng cố hạ tầng sau thiên tai 2026</h1>
      <p>Ban QLDA Hạ tầng Viễn thông – VTNet</p>
    </div>
  </div>
  <div class="dbar">
    <span>Hạn chót ký HĐ: <b>31/5/2026</b></span>
    <span>Báo cáo TGĐ: <b>2/6/2026</b></span>
    <span>HT: Chung 0984.699.990 | Hùng 0965.466.116</span>
  </div>

  <div class="tabs">
    <button class="tab active" id="t_form" onclick="sw('form')">✏️ Cập nhật</button>
    <button class="tab" id="t_dash" onclick="sw('dash')">📊 Dashboard</button>
    <button class="tab" id="t_table" onclick="sw('table')">📋 Tổng hợp</button>
    <button class="tab" id="t_emg" onclick="sw('emg')">🚨 Ứng cứu khẩn cấp</button>
  </div>

  <div class="bar2">
    <span><span class="sdot" id="dot"></span><span class="slbl" id="lbl">Đang tải...</span></span>
    <button class="rbtn" onclick="loadAll()">↻ Tải lại</button>
    <select class="pf" id="pf" onchange="buildForm(this.value)"><option value="">— Tất cả tỉnh —</option></select>
  </div>

  <div id="v_form" class="view"><p style="padding:24px;color:#aaa">Đang tải...</p></div>
  <div id="v_dash" class="view hidden"></div>
  <div id="v_table" class="view hidden"></div>
  <div id="v_emg" class="view hidden"></div>
</div>

<script>
const SB_URL='https://kcbwbeaqymoarzjuzvct.supabase.co';
const SB_KEY='sb_publishable_OZBkUV-W9f7IITFdY-awMA_ZbR0OJwx';

const PROV=[
  {c:'BNH',n:'Bac Ninh',kv:'KV1'},{c:'DLK',n:'Dak Lak',kv:'KV2'},
  {c:'DNG',n:'Da Nang',kv:'KV2'},{c:'GLI',n:'Gia Lai',kv:'KV2'},
  {c:'HNI',n:'Ha Noi',kv:'KV1'},{c:'HPG',n:'Hai Phong',kv:'KV1'},
  {c:'HTH',n:'Ha Tinh',kv:'KV1'},{c:'HUE',n:'Hue',kv:'KV2'},
  {c:'HYN',n:'Hung Yen',kv:'KV1'},{c:'KHA',n:'Khanh Hoa',kv:'KV2'},
  {c:'LCI',n:'Lao Cai',kv:'KV1'},{c:'LDG',n:'Lam Dong',kv:'KV2'},
  {c:'LSN',n:'Lang Son',kv:'KV1'},{c:'NAN',n:'Nghe An',kv:'KV1'},
  {c:'NBH',n:'Ninh Binh',kv:'KV1'},{c:'QNH',n:'Quang Ninh',kv:'KV1'},
  {c:'QNI',n:'Quang Ngai',kv:'KV2'},{c:'QTI',n:'Quang Tri',kv:'KV1'},
  {c:'THA',n:'Thanh Hoa',kv:'KV1'},{c:'TNN',n:'Thai Nguyen',kv:'KV1'},
];
const STEPS=[
  {k:'dt',    t:'1. Du toan',           opts:['Chua lap','Dang lap','Da phe duyet'],            deadline:'2026-04-05'},
  {k:'khlcnt',t:'2. Ke hoach LCNT',     opts:['Chua lap','Dang lap','Da phe duyet'],            deadline:'2026-04-15'},
  {k:'hsmt',  t:'3. Phat hanh HSMT',    opts:['Chua phat hanh','Da phat hanh'],                 deadline:'2026-04-20'},
  {k:'kqlcnt',t:'4. Phe duyet KQ LCNT', opts:['Chua thuc hien','Dang danh gia','Da phe duyet'],deadline:'2026-05-10'},
  {k:'hdk',   t:'5. Ky Hop dong khung', opts:['Chua ky','Dang dam phan','Da ky'],               deadline:'2026-05-31'},
];
const FINAL_DEADLINE='2026-05-31';

const D={};
PROV.forEach(p=>D[p.c]={});

// ── Supabase (fixed header order) ─────────────────────────
function sbReq(path,opts){
  opts=opts||{};
  var h={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'};
  if(opts.headers) for(var k in opts.headers) h[k]=opts.headers[k];
  var o={};for(var x in opts)o[x]=opts[x];o.headers=h;
  return fetch(SB_URL+'/rest/v1/'+path,o);
}
function sync(s){
  var dot=document.getElementById('dot'),lbl=document.getElementById('lbl');
  var m={spin:['spin','Đang lưu...'],ok:['','Đã lưu'],loaded:['','Dữ liệu sẵn sàng'],err:['err','Lỗi kết nối']};
  dot.className='sdot '+((m[s]&&m[s][0])||'');
  lbl.textContent=(m[s]&&m[s][1])||s;
}
function loadAll(){
  sync('spin');
  sbReq('tiendo?select=code,data,updated_at').then(function(r){return r.json();}).then(function(rows){
    if(Array.isArray(rows)) rows.forEach(function(row){var d=row.data||{};d._upd=row.updated_at;D[row.code]=d;});
    sync('loaded');
    refreshActive();
  }).catch(function(){sync('err');refreshActive();});
}
function saveProv(c,cb){
  sync('spin');
  var payload={code:c,data:D[c],updated_at:new Date().toISOString()};
  sbReq('tiendo',{method:'POST',headers:{'Prefer':'resolution=merge-duplicates'},body:JSON.stringify(payload)})
    .then(function(r){sync(r.ok||r.status===201||r.status===204?'ok':'err');if(cb)cb();})
    .catch(function(){sync('err');if(cb)cb();});
}

// ── Helpers ───────────────────────────────────────────────
function pct(d){var n=0;STEPS.forEach(function(s){var v=d[s.k]||'';if(v&&v.indexOf('Chua')!==0)n++;});return Math.round(n/STEPS.length*100);}
function tcls(v){if(!v||v.indexOf('Chua')===0)return 'tn';if(v.indexOf('Dang')>=0||v.indexOf('dam')>=0)return 'td2';return 'tk';}
function daysBetween(d1,d2){return Math.round((d2-d1)/(1000*60*60*24));}
function today(){return new Date();}

// ── FORM ──────────────────────────────────────────────────
function buildForm(filter){
  var w=document.getElementById('v_form');w.innerHTML='';
  PROV.filter(function(p){return !filter||p.c===filter;}).forEach(function(p){
    var d=D[p.c]||{};var pc=pct(d),hdk=d.hdk||'';
    var pill='Chua cap nhat',pcls='pn';
    if(hdk==='Da ky'){pill='Da ky HD';pcls='pd';}else if(pc>0){pill=pc+'% hoan thanh';pcls='pw';}
    var upd=d._upd?'Cap nhat: '+new Date(d._upd).toLocaleString('vi-VN'):'';
    var el=document.createElement('div');el.className='card';el.id='c_'+p.c;
    var html='<div class="ch" id="h_'+p.c+'" onclick="tog(\''+p.c+'\')">'
      +'<span class="kvb '+(p.kv==='KV2'?'kv2':'kv1')+'">'+p.kv+'</span>'
      +'<span class="pnm">'+p.n+' ('+p.c+')</span>'
      +(upd?'<span class="utime">'+upd+'</span>':'')
      +'<span class="spill '+pcls+'" id="sp_'+p.c+'">'+pill+'</span>'
      +'<span class="caret" id="cr_'+p.c+'">&#9660;</span></div>'
      +'<div class="cb" id="b_'+p.c+'"><div class="sg">';
    STEPS.forEach(function(s,i){
      var v=d[s.k]||s.opts[0],dt=d[s.k+'_d']||'',done=v&&v.indexOf('Chua')!==0;
      html+='<div class="sb'+(done?' done':'')+'" id="sb_'+p.c+'_'+s.k+'">'
        +'<div class="sn">Buoc '+(i+1)+'</div><div class="st">'+s.t+'</div>'
        +'<select onchange="chg(\''+p.c+'\',\''+s.k+'\',this.value)">'
        +s.opts.map(function(o){return '<option'+(v===o?' selected':'')+'>'+o+'</option>';}).join('')
        +'</select><input type="date" value="'+dt+'" onchange="chg(\''+p.c+'\',\''+s.k+'_d\',this.value)"></div>';
    });
    html+='</div>'
      +'<div class="subhead">Thong tin nha thau (phuc vu ung cuu khan cap)</div>'
      +'<div class="ns">'
      +'<label>Ten nha thau chinh</label><input value="'+(d.nt_name||'')+'" onchange="chg(\''+p.c+'\',\'nt_name\',this.value)" placeholder="Cong ty...">'
      +'<label>SDT lien he khan cap</label><input value="'+(d.nt_phone||'')+'" onchange="chg(\''+p.c+'\',\'nt_phone\',this.value)" placeholder="09...">'
      +'<label>Thoi gian huy dong sau PO (gio)</label><input value="'+(d.nt_time||'')+'" onchange="chg(\''+p.c+'\',\'nt_time\',this.value)" placeholder="VD: 24">'
      +'<label>So HD da ky</label><input value="'+(d.nt_count||'')+'" onchange="chg(\''+p.c+'\',\'nt_count\',this.value)" placeholder="VD: 2">'
      +'</div>'
      +'<div class="subhead">Ghi chu</div>'
      +'<div class="ns"><textarea onchange="chg(\''+p.c+'\',\'note\',this.value)" placeholder="Vuong mac, kien nghi...">'+(d.note||'')+'</textarea></div>'
      +'<div class="sr"><button class="svbtn" id="sv_'+p.c+'" onclick="sv(\''+p.c+'\')">Luu len he thong</button>'
      +'<span class="ok" id="ok_'+p.c+'">Da luu!</span></div></div>';
    el.innerHTML=html;w.appendChild(el);
  });
}
function tog(c){['b_','h_','cr_'].forEach(function(pre){document.getElementById(pre+c).classList.toggle('open');});}
function chg(c,k,v){if(!D[c])D[c]={};D[c][k]=v;if(k.indexOf('_d')<0&&STEPS.some(function(s){return s.k===k;})){var el=document.getElementById('sb_'+c+'_'+k);if(el)el.className='sb'+(v&&v.indexOf('Chua')!==0?' done':'');}}
function sv(c){var btn=document.getElementById('sv_'+c);btn.disabled=true;saveProv(c,function(){btn.disabled=false;D[c]._upd=new Date().toISOString();var pc2=pct(D[c]),hdk=D[c].hdk||'';var sp=document.getElementById('sp_'+c);sp.className='spill '+(hdk==='Da ky'?'pd':pc2>0?'pw':'pn');sp.textContent=hdk==='Da ky'?'Da ky HD':pc2>0?pc2+'% hoan thanh':'Chua cap nhat';var ok=document.getElementById('ok_'+c);ok.style.display='inline';setTimeout(function(){ok.style.display='none';},2000);});}

// ── DASHBOARD ─────────────────────────────────────────────
function buildDash(){
  var w=document.getElementById('v_dash');
  var done=0,doing=0,not_=0;
  PROV.forEach(function(p){var d=D[p.c]||{};if((d.hdk||'')==='Da ky')done++;else if(pct(d)>0)doing++;else not_++;});
  var totalPct=Math.round(PROV.reduce(function(a,p){return a+pct(D[p.c]||{});},0)/PROV.length);

  // Countdown
  var now=today();var dl=new Date(FINAL_DEADLINE);var daysLeft=daysBetween(now,dl);
  var urgent=daysLeft<=30;

  // Step completion stats
  var stepStats=STEPS.map(function(s){
    var c=0;PROV.forEach(function(p){var v=(D[p.c]||{})[s.k]||'';if(v&&v.indexOf('Chua')!==0)c++;});
    return {t:s.t,count:c,pct:Math.round(c/PROV.length*100)};
  });

  // KV comparison
  var kv1=PROV.filter(function(p){return p.kv==='KV1';});
  var kv2=PROV.filter(function(p){return p.kv==='KV2';});
  var kv1done=kv1.filter(function(p){return (D[p.c]||{}).hdk==='Da ky';}).length;
  var kv2done=kv2.filter(function(p){return (D[p.c]||{}).hdk==='Da ky';}).length;

  // At-risk detection
  var risks=[];
  PROV.forEach(function(p){
    var d=D[p.c]||{};
    if(d.hdk==='Da ky')return;
    STEPS.forEach(function(s){
      var v=d[s.k]||'';var sdl=new Date(s.deadline);var dd=daysBetween(now,sdl);
      if((!v||v.indexOf('Chua')===0)&&dd<=10){
        risks.push({code:p.c,name:p.n,step:s.t,days:dd});
      }
    });
  });
  // unique by province - keep most urgent
  var riskMap={};
  risks.forEach(function(r){if(!riskMap[r.code]||r.days<riskMap[r.code].days)riskMap[r.code]=r;});
  var riskList=Object.keys(riskMap).map(function(k){return riskMap[k];}).sort(function(a,b){return a.days-b.days;});

  var circ=2*Math.PI*54;
  var doneOffset=circ*(1-done/PROV.length);

  var html=''
  // Countdown
  +'<div class="panel"><h3><span class="ic">⏱️</span> Đếm ngược đến hạn chót ký HĐ khung</h3>'
  +'<div class="countdown">'
  +'<div class="cd-box'+(urgent?' urgent':'')+'"><div class="num">'+(daysLeft>0?daysLeft:0)+'</div><div class="unit">ngày còn lại</div></div>'
  +'<div class="cd-info"><div class="big">'+(daysLeft>0?('Còn '+daysLeft+' ngày đến 31/5/2026'):'ĐÃ QUA HẠN')+'</div>'
  +'<div class="small">Tiến độ toàn hệ thống: <b>'+totalPct+'%</b> · Đã ký: <b>'+done+'/'+PROV.length+'</b> tỉnh</div></div>'
  +'</div></div>'

  // KPIs
  +'<div class="kpi-row">'
  +'<div class="kpi green"><div class="n">'+done+'</div><div class="l">Đã ký HĐ khung</div><div class="pct">'+Math.round(done/PROV.length*100)+'% mục tiêu</div></div>'
  +'<div class="kpi amber"><div class="n">'+doing+'</div><div class="l">Đang triển khai</div></div>'
  +'<div class="kpi red"><div class="n">'+not_+'</div><div class="l">Chưa bắt đầu</div></div>'
  +'<div class="kpi"><div class="n">'+totalPct+'%</div><div class="l">Tiến độ tổng thể</div></div>'
  +'<div class="kpi '+(riskList.length>0?'red':'green')+'"><div class="n">'+riskList.length+'</div><div class="l">Tỉnh cần chú ý</div></div>'
  +'</div>'

  // At-risk
  +'<div class="panel"><h3><span class="ic">⚠️</span> Cảnh báo tỉnh có nguy cơ chậm tiến độ</h3>';
  if(riskList.length===0){
    html+='<div class="risk-empty">✓ Không có tỉnh nào đang chậm tiến độ. Tất cả đang đúng lộ trình.</div>';
  }else{
    riskList.forEach(function(r){
      var cls=r.days<0?'':'warn';
      var dtxt=r.days<0?('Trễ '+Math.abs(r.days)+' ngày'):('Còn '+r.days+' ngày');
      html+='<div class="risk-item '+cls+'"><span class="code">'+r.name+' ('+r.code+')</span>'
        +'<span class="desc">Bước cần hoàn thành: <b>'+r.step+'</b></span>'
        +'<span class="days">'+dtxt+'</span></div>';
    });
  }
  html+='</div>'

  // Step progress
  +'<div class="panel"><h3><span class="ic">📈</span> Tiến độ theo từng bước (toàn hệ thống)</h3>';
  stepStats.forEach(function(s){
    html+='<div class="stepbar"><div class="top"><b>'+s.t+'</b><span>'+s.count+'/20 tỉnh · '+s.pct+'%</span></div>'
      +'<div class="track"><div class="fill" style="width:'+s.pct+'%">'+(s.pct>15?s.pct+'%':'')+'</div></div></div>';
  });
  html+='</div>'

  // KV comparison
  +'<div class="panel"><h3><span class="ic">🗺️</span> So sánh tiến độ KV1 / KV2</h3>'
  +'<div class="kv-compare">'
  +'<div class="donut"><svg width="140" height="140"><circle cx="70" cy="70" r="54" fill="none" stroke="#eef2f7" stroke-width="16"/>'
  +'<circle cx="70" cy="70" r="54" fill="none" stroke="#10b981" stroke-width="16" stroke-dasharray="'+circ+'" stroke-dashoffset="'+doneOffset+'" stroke-linecap="round"/></svg>'
  +'<div class="center"><div class="big">'+done+'/20</div><div class="lbl">đã ký HĐ</div></div></div>'
  +'<div class="kv-legend">'
  +'<div class="item"><span class="sw" style="background:#B5D4F4"></span><span class="nm">KV1 (Miền Bắc & Bắc TB) – 13 tỉnh</span><span class="vl">'+kv1done+'/13</span></div>'
  +'<div class="item"><span class="sw" style="background:#C0DD97"></span><span class="nm">KV2 (Trung Bộ & Tây Nguyên) – 7 tỉnh</span><span class="vl">'+kv2done+'/7</span></div>'
  +'</div></div></div>';

  w.innerHTML=html;
}

// ── TABLE ─────────────────────────────────────────────────
function buildTable(){
  var w=document.getElementById('v_table');
  var html='<div class="export-row">'
    +'<button class="ebtn" onclick="exportCSV()">⬇ Xuất CSV (Excel)</button>'
    +'<button class="ebtn" onclick="window.print()">🖨 In báo cáo</button>'
    +'<button class="rbtn" onclick="loadAll()">↻ Tải lại dữ liệu</button></div>'
    +'<div class="dtw"><table><thead><tr><th style="text-align:left;padding-left:14px">Tỉnh/TP</th>';
  STEPS.forEach(function(s){html+='<th>'+s.t+'</th>';});
  html+='<th>Tiến độ</th><th>Ngày ký HĐ</th><th>Cập nhật</th><th>Ghi chú</th></tr></thead><tbody>';
  PROV.forEach(function(p){
    var d=D[p.c]||{},pc2=pct(d);
    var upd=d._upd?new Date(d._upd).toLocaleDateString('vi-VN'):'—';
    html+='<tr><td><span style="font-size:10px;color:'+(p.kv==='KV2'?'#27500A':'#0C447C')+';font-weight:700">['+p.kv+']</span> '+p.n+'</td>';
    STEPS.forEach(function(s){var v=d[s.k]||'—',dt=d[s.k+'_d']||'';html+='<td><span class="tp '+tcls(v)+'">'+v+'</span>'+(dt?'<span class="tdt">'+dt+'</span>':'')+'</td>';});
    html+='<td><div class="pw2"><div class="pb"><div class="pf2" style="width:'+pc2+'%"></div></div><span class="pc">'+pc2+'%</span></div></td>'
      +'<td style="font-size:10px">'+(d.hdk_d||'—')+'</td><td style="font-size:10px;color:#bbb">'+upd+'</td>'
      +'<td style="font-size:10px;color:#888;max-width:110px">'+(d.note||'')+'</td></tr>';
  });
  html+='</tbody></table></div>';
  w.innerHTML=html;
}
function exportCSV(){
  var rows=[['Tinh/TP','KV','Du toan','Ngay DT','KH LCNT','Ngay KHLCNT','HSMT','Ngay HSMT','KQ LCNT','Ngay KQ','Ky HD','Ngay ky','Tien do %','Nha thau','SDT','Ghi chu']];
  PROV.forEach(function(p){var d=D[p.c]||{};rows.push([p.n,p.kv,d.dt||'',d.dt_d||'',d.khlcnt||'',d.khlcnt_d||'',d.hsmt||'',d.hsmt_d||'',d.kqlcnt||'',d.kqlcnt_d||'',d.hdk||'',d.hdk_d||'',pct(d)+'%',d.nt_name||'',d.nt_phone||'',(d.note||'').replace(/[\r\n,]/g,' ')]);});
  var csv='\uFEFF'+rows.map(function(r){return r.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='TienDo_HDKhung_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

// ── EMERGENCY ─────────────────────────────────────────────
function buildEmg(){
  var w=document.getElementById('v_emg');
  var opts='<option value="">— Chọn tỉnh bị ảnh hưởng —</option>';
  PROV.forEach(function(p){opts+='<option value="'+p.c+'">'+p.n+' ('+p.c+') – '+p.kv+'</option>';});
  var html='<div class="emg-banner"><span class="ic">🚨</span>'
    +'<div class="txt"><h3>Chế độ ứng cứu khẩn cấp sau thiên tai</h3>'
    +'<p>Khi có bão/thiên tai đổ bộ, chọn tỉnh bị ảnh hưởng để truy xuất ngay nhà thầu đã ký + liên hệ khẩn cấp</p></div>'
    +'<div class="emg-toggle"><select class="emg-prov-select" id="emgSel" onchange="showEmg(this.value)">'+opts+'</select></div></div>'
    +'<div id="emgResult"><div class="empty-state"><div class="ic">📡</div><p>Chọn tỉnh bị ảnh hưởng phía trên để xem danh sách nhà thầu sẵn sàng ứng cứu.</p></div></div>';
  w.innerHTML=html;
}
function showEmg(code){
  var r=document.getElementById('emgResult');
  if(!code){buildEmg();return;}
  var p=PROV.filter(function(x){return x.c===code;})[0];
  var d=D[code]||{};
  var signed=d.hdk==='Da ky';
  var html='<div class="contractor-card"><div class="cc-head">'
    +'<span class="kvb '+(p.kv==='KV2'?'kv2':'kv1')+'">'+p.kv+'</span>'
    +'<span class="nm">'+p.n+' ('+p.c+')</span>'
    +'<span class="ready'+(signed?'':' no')+'">'+(signed?'✓ SẴN SÀNG':'⚠ CHƯA KÝ HĐ')+'</span></div>'
    +'<div class="cc-body">';
  if(signed){
    html+='<div class="cc-row"><span class="lbl">Nhà thầu chính:</span><span class="val">'+(d.nt_name||'(chưa nhập)')+'</span></div>'
      +'<div class="cc-row"><span class="lbl">📞 Liên hệ khẩn cấp:</span><span class="val cc-phone">'+(d.nt_phone?'<a href="tel:'+d.nt_phone+'">'+d.nt_phone+'</a>':'(chưa nhập)')+'</span></div>'
      +'<div class="cc-row"><span class="lbl">⏱ Huy động sau PO:</span><span class="val">'+(d.nt_time?d.nt_time+' giờ':'(chưa nhập)')+'</span></div>'
      +'<div class="cc-row"><span class="lbl">Số HĐ đã ký:</span><span class="val">'+(d.nt_count||'(chưa nhập)')+'</span></div>'
      +'<div class="cc-row"><span class="lbl">Ngày ký HĐ:</span><span class="val">'+(d.hdk_d||'—')+'</span></div>';
  }else{
    html+='<div style="padding:10px 0;color:#dc2626;font-size:13px;font-weight:600">⚠ Tỉnh này CHƯA ký HĐ khung — chưa có nhà thầu sẵn sàng. Cần xử lý pháp lý khẩn cấp hoặc điều phối nhà thầu từ tỉnh lân cận.</div>'
      +'<div class="cc-row"><span class="lbl">Tiến độ hiện tại:</span><span class="val">'+pct(d)+'% (bước cuối: '+(d.hdk||'Chua ky')+')</span></div>';
  }
  if(d.note) html+='<div class="cc-row"><span class="lbl">Ghi chú:</span><span class="val">'+d.note+'</span></div>';
  html+='</div></div>';

  // Nearby provinces same KV that are ready (backup)
  var backups=PROV.filter(function(x){return x.kv===p.kv&&x.c!==code&&(D[x.c]||{}).hdk==='Da ky';});
  if(backups.length){
    html+='<div class="panel"><h3><span class="ic">🤝</span> Nhà thầu dự phòng cùng khu vực ('+p.kv+') – có thể điều phối hỗ trợ</h3>';
    backups.forEach(function(b){var bd=D[b.c]||{};html+='<div class="cc-row" style="padding:8px 0;border-bottom:1px solid #f0f4f8"><span class="lbl">'+b.n+' ('+b.c+'):</span><span class="val">'+(bd.nt_name||'NT đã ký')+' · <span class="cc-phone" style="font-size:13px">'+(bd.nt_phone||'')+'</span></span></div>';});
    html+='</div>';
  }
  r.innerHTML=html;
}

// ── Tabs ──────────────────────────────────────────────────
var activeView='form';
function sw(v){
  activeView=v;
  ['form','dash','table','emg'].forEach(function(x){
    document.getElementById('t_'+x).classList.toggle('active',x===v);
    document.getElementById('v_'+x).classList.toggle('hidden',x!==v);
  });
  refreshActive();
}
function refreshActive(){
  if(activeView==='form')buildForm(document.getElementById('pf').value||'');
  else if(activeView==='dash')buildDash();
  else if(activeView==='table')buildTable();
  else if(activeView==='emg'){if(!document.getElementById('emgSel'))buildEmg();}
}

// Init
var pf=document.getElementById('pf');
PROV.forEach(function(p){var o=document.createElement('option');o.value=p.c;o.textContent=p.n+' ('+p.c+')';pf.appendChild(o);});
loadAll();
</script>
