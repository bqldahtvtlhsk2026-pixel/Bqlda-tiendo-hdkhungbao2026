<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Theo doi tien do ky HD khung 2026 – VTNet</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#eef2f7;min-height:100vh}
.top-bar{background:#1F4E79;color:#fff;padding:12px 20px}
.top-bar h1{font-size:15px;font-weight:600}
.top-bar p{font-size:11px;opacity:.72;margin-top:2px}
.dbar{background:#2E75B6;color:#fff;padding:6px 20px;font-size:11px;display:flex;gap:20px;flex-wrap:wrap}
.dbar b{color:#FFD966}
.bar{padding:10px 20px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;border-bottom:1px solid #e0e8f0;background:#fff}
.tbtn{padding:5px 16px;border-radius:20px;border:1px solid #ccc;background:transparent;color:#666;font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s}
.tbtn.active{background:#1F4E79;color:#fff;border-color:#1F4E79}
.sdot{width:8px;height:8px;border-radius:50%;background:#4CAF50;display:inline-block;margin-right:4px;transition:background .2s}
.sdot.spin{background:#FF9800}.sdot.err{background:#f44336}
.slbl{font-size:11px;color:#666}
.rbtn{padding:4px 12px;border-radius:20px;border:1px solid #ccc;background:#fff;font-size:11px;cursor:pointer;font-family:inherit}
.rbtn:hover{background:#f5f5f5}
select.pf{margin-left:auto;padding:4px 12px;border-radius:20px;border:1px solid #ccc;background:#fff;font-size:12px;font-family:inherit}
#fv,#dv{padding:14px 20px 36px;max-width:1100px;margin:0 auto}
.card{background:#fff;border:1px solid #dde6f0;border-radius:10px;margin-bottom:10px;overflow:hidden;transition:box-shadow .15s}
.card:hover{box-shadow:0 2px 12px rgba(31,78,121,.10)}
.ch{display:flex;align-items:center;gap:8px;padding:11px 16px;cursor:pointer;background:#f6f9fc}
.ch.open{border-bottom:1px solid #dde6f0}
.kvb{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;flex-shrink:0}
.kv1{background:#B5D4F4;color:#0C447C}.kv2{background:#C0DD97;color:#27500A}
.pnm{font-size:14px;font-weight:600;flex:1}
.utime{font-size:10px;color:#ccc;margin-right:4px}
.spill{font-size:10px;padding:2px 9px;border-radius:10px;font-weight:600}
.pn{background:#f0f0f0;color:#999}.pw{background:#FFF3CD;color:#856404}.pd{background:#D4EDDA;color:#155724}
.caret{font-size:11px;color:#ccc;transition:transform .2s}.caret.open{transform:rotate(180deg)}
.cb{display:none;padding:16px}.cb.open{display:block}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px}
.sb{background:#f8f9fb;border-radius:8px;padding:11px 13px;border:1px solid #e8edf2}
.sb.done{background:#f0faf4;border-color:#a8d8b3}
.sn{font-size:10px;font-weight:700;color:#2E75B6;text-transform:uppercase;letter-spacing:.05em}
.st{font-size:12px;font-weight:600;color:#333;margin:3px 0 9px}
.sb select,.sb input[type=date]{width:100%;margin-bottom:5px;font-size:12px;padding:5px 8px;border:1px solid #ccc;border-radius:6px;font-family:inherit;background:#fff}
.sb select:focus,.sb input:focus{outline:none;border-color:#2E75B6}
.ns{margin-top:13px}
.ns label{font-size:11px;font-weight:600;color:#777;display:block;margin-bottom:4px}
.ns textarea{width:100%;font-size:12px;min-height:50px;resize:vertical;padding:7px 10px;border:1px solid #ccc;border-radius:6px;font-family:inherit}
.ns textarea:focus{outline:none;border-color:#2E75B6}
.sr{display:flex;align-items:center;gap:10px;margin-top:13px}
.svbtn{padding:8px 20px;border-radius:7px;background:#1F4E79;color:#fff;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.svbtn:hover{background:#2E75B6}.svbtn:disabled{opacity:.45;cursor:not-allowed}
.ok{font-size:11px;color:#155724;font-weight:600;display:none}
.sumrow{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.sc{background:#fff;border-radius:10px;padding:12px 16px;text-align:center;border:1px solid #e0e8f0}
.snum{font-size:26px;font-weight:600}
.g{color:#27500A}.a{color:#633806}.r{color:#791F1F}.bl{color:#0C447C}
.sl{font-size:10px;color:#aaa;margin-top:2px}
.dtw{overflow-x:auto;border-radius:10px;border:1px solid #dde6f0;background:#fff}
table{width:100%;border-collapse:collapse;font-size:11px;min-width:820px}
thead tr{background:#1F4E79}
th{padding:9px 8px;color:#fff;font-weight:600;text-align:center;white-space:nowrap}
th:first-child{text-align:left;padding-left:14px}
td{padding:7px 8px;border-bottom:1px solid #f0f4f8;text-align:center;vertical-align:middle}
td:first-child{text-align:left;padding-left:14px;font-weight:600}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f7fafd}
.tp{display:inline-block;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:600}
.tn{background:#f0f0f0;color:#999}.td{background:#FFF3CD;color:#856404}.tk{background:#D4EDDA;color:#155724}
.tdt{font-size:10px;color:#bbb;display:block;margin-top:1px}
.pw2{display:inline-flex;align-items:center;gap:5px}
.pb{width:56px;height:5px;border-radius:3px;background:#e0e8f0}
.pf2{height:100%;border-radius:3px;background:#2E75B6}
.pc{font-size:10px;color:#185FA5;font-weight:600;min-width:28px}
</style>
</head>
<body>

<div id="app">
  <div class="top-bar">
    <h1>Theo doi tien do ky Hop dong khung – Cung co ha tang sau thien tai 2026</h1>
    <p>Ban QLDA Ha tang Vien thong – VTNet &nbsp;|&nbsp; Du lieu dung chung, luu tren Supabase</p>
  </div>
  <div class="dbar">
    <span>Han chot ky HD: <b>31/5/2026</b></span>
    <span>Bao cao B.QLDAHTVT: <b>02/6/2026</b></span>
    <span>D/c Chung: 0984.699.990 | D/c Hung: 0965.466.116</span>
  </div>
  <div class="bar">
    <button class="tbtn active" id="bF" onclick="sw('f')">Cap nhat tien do</button>
    <button class="tbtn" id="bD" onclick="sw('d')">Tong hop</button>
    <span><span class="sdot" id="dot"></span><span class="slbl" id="lbl">Dang tai...</span></span>
    <button class="rbtn" onclick="loadAll()">Tai lai</button>
    <select class="pf" id="pf" onchange="buildForm(this.value)"><option value="">-- Tat ca tinh --</option></select>
  </div>
  <div id="fv"><p style="padding:24px;color:#aaa;font-size:13px">Dang tai du lieu...</p></div>
  <div id="dv" style="display:none"></div>
</div>

<script>
// ── Supabase credentials (nhung san vao file) ─────────────
const SB_URL = 'https://kcbwbeaqymoarzjuzvct.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtjYndiZWFxeW1vYXJ6anV6dmN0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNjkwMTAsImV4cCI6MjA5MTk0NTAxMH0.yn6jGGmVTONEa-hieqU0A5OfdswP5U06rmtVIYmaAeg';

const PROV=[
  {c:'BNH',n:'Bac Ninh',kv:'KV1'},{c:'DLK',n:'Dak Lak',kv:'KV2'},
  {c:'DNG',n:'Da Nang',kv:'KV2'},{c:'GLI',n:'Gia Lai',kv:'KV2'},
  {c:'HNI',n:'Ha Noi',kv:'KV1'},{c:'HPG',n:'Hai Phong',kv:'KV1'},
  {c:'HTH',n:'Ha Tinh',kv:'KV1'},{c:'HUE',n:'Hue',kv:'KV2'},
  {c:'HYN',n:'Hung Yen',kv:'KV1'},{c:'KHA',n:'Khanh Hoa',kv:'KV2'},
  {c:'LCI',n:'Lao Cai',kv:'KV1'},{c:'LDG',n:'Lam Dong',kv:'KV2'},
  {c:'LSN',n:'Lang Son',kv:'KV1'},{c:'NAN',n:'Nghe An',kv:'KV1'},
  {c:'NBH',n:'Ninh Binh',kv:'KV1'},{c:'QNH',n:'Quang Ninh',kv:'KV1'},
  {c:'QNI',n:'Quang Ngai',kv:'KV2'},{c:'QTI',n:'Quang Tri',kv:'KV1'},
  {c:'THA',n:'Thanh Hoa',kv:'KV1'},{c:'TNN',n:'Thai Nguyen',kv:'KV1'},
];
const STEPS=[
  {k:'dt',    t:'1. Du toan',           opts:['Chua lap','Dang lap','Da phe duyet']},
  {k:'khlcnt',t:'2. Ke hoach LCNT',     opts:['Chua lap','Dang lap','Da phe duyet']},
  {k:'hsmt',  t:'3. Phat hanh HSMT',    opts:['Chua phat hanh','Da phat hanh']},
  {k:'kqlcnt',t:'4. Phe duyet KQ LCNT', opts:['Chua thuc hien','Dang danh gia','Da phe duyet']},
  {k:'hdk',   t:'5. Ky Hop dong khung', opts:['Chua ky','Dang dam phan','Da ky']},
];

const D={};
PROV.forEach(p=>D[p.c]={});

function sbReq(path,opts={}){
  return fetch(SB_URL+'/rest/v1/'+path,{
    headers:{
      'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,
      'Content-Type':'application/json','Prefer':'return=minimal',
      ...(opts.headers||{})
    },...opts
  });
}

function sync(s){
  const dot=document.getElementById('dot'),lbl=document.getElementById('lbl');
  const m={spin:['spin','Dang luu...'],ok:['','Da luu'],loaded:['','Du lieu san sang'],err:['err','Loi ket noi']};
  dot.className='sdot '+((m[s]&&m[s][0])||'');
  lbl.textContent=(m[s]&&m[s][1])||s;
}

async function loadAll(){
  sync('spin');
  try{
    const r=await sbReq('tiendo?select=code,data,updated_at');
    const rows=await r.json();
    if(Array.isArray(rows)) rows.forEach(row=>{D[row.code]={...row.data,_upd:row.updated_at};});
    sync('loaded');
  }catch(e){sync('err');}
  buildForm(document.getElementById('pf').value||'');
  if(document.getElementById('dv').style.display!=='none') buildDash();
}

async function saveProv(c){
  sync('spin');
  const payload={code:c,data:D[c],updated_at:new Date().toISOString()};
  try{
    const r=await sbReq('tiendo',{
      method:'POST',
      headers:{'Prefer':'resolution=merge-duplicates'},
      body:JSON.stringify(payload)
    });
    sync(r.ok||r.status===201||r.status===204?'ok':'err');
  }catch(e){sync('err');}
}

function pct(d){
  let n=0;
  STEPS.forEach(s=>{const v=d[s.k]||'';if(v&&!v.startsWith('Chua'))n++;});
  return Math.round(n/STEPS.length*100);
}
function tcls(v){
  if(!v||v.startsWith('Chua'))return 'tn';
  if(v.includes('Dang')||v.includes('dam'))return 'td';
  return 'tk';
}

function buildForm(filter){
  const w=document.getElementById('fv');w.innerHTML='';
  PROV.filter(p=>!filter||p.c===filter).forEach(p=>{
    const d=D[p.c]||{};
    const pc=pct(d),hdk=d.hdk||'';
    let pill='Chua cap nhat',pcls='pn';
    if(hdk==='Da ky'){pill='Da ky HD';pcls='pd';}
    else if(pc>0){pill=pc+'% hoan thanh';pcls='pw';}
    const upd=d._upd?'Cap nhat: '+new Date(d._upd).toLocaleString('vi-VN'):'';
    const el=document.createElement('div');
    el.className='card';el.id='c_'+p.c;
    el.innerHTML=
      '<div class="ch" id="h_'+p.c+'" onclick="tog(\''+p.c+'\')">'
        +'<span class="kvb '+(p.kv==='KV2'?'kv2':'kv1')+'">'+p.kv+'</span>'
        +'<span class="pnm">'+p.n+' ('+p.c+')</span>'
        +(upd?'<span class="utime">'+upd+'</span>':'')
        +'<span class="spill '+pcls+'" id="sp_'+p.c+'">'+pill+'</span>'
        +'<span class="caret" id="cr_'+p.c+'">&#9660;</span>'
      +'</div>'
      +'<div class="cb" id="b_'+p.c+'">'
        +'<div class="sg">'
        +STEPS.map((s,i)=>{
          const v=d[s.k]||s.opts[0],dt=d[s.k+'_d']||'',done=v&&!v.startsWith('Chua');
          return '<div class="sb'+(done?' done':'')+'" id="sb_'+p.c+'_'+s.k+'">'
            +'<div class="sn">Buoc '+(i+1)+'</div>'
            +'<div class="st">'+s.t+'</div>'
            +'<select onchange="chg(\''+p.c+'\',\''+s.k+'\',this.value)">'
            +s.opts.map(o=>'<option'+(v===o?' selected':'')+'>'+o+'</option>').join('')
            +'</select>'
            +'<input type="date" value="'+dt+'" onchange="chg(\''+p.c+'\',\''+s.k+'_d\',this.value)">'
            +'</div>';
        }).join('')
        +'</div>'
        +'<div class="ns"><label>Ghi chu / Vuong mac (neu co)</label>'
        +'<textarea onchange="chg(\''+p.c+'\',\'note\',this.value)">'+(d.note||'')+'</textarea></div>'
        +'<div class="sr">'
        +'<button class="svbtn" id="sv_'+p.c+'" onclick="sv(\''+p.c+'\')">Luu len Supabase</button>'
        +'<span class="ok" id="ok_'+p.c+'">Da luu!</span>'
        +'</div>'
      +'</div>';
    w.appendChild(el);
  });
}

function tog(c){
  ['b_','h_','cr_'].forEach(pre=>document.getElementById(pre+c).classList.toggle('open'));
}
function chg(c,k,v){
  if(!D[c])D[c]={};D[c][k]=v;
  if(!k.endsWith('_d')){
    const el=document.getElementById('sb_'+c+'_'+k);
    if(el) el.className='sb'+(v&&!v.startsWith('Chua')?' done':'');
  }
}
async function sv(c){
  const btn=document.getElementById('sv_'+c);btn.disabled=true;
  await saveProv(c);btn.disabled=false;
  D[c]._upd=new Date().toISOString();
  const pc2=pct(D[c]),hdk=D[c].hdk||'';
  const sp=document.getElementById('sp_'+c);
  sp.className='spill '+(hdk==='Da ky'?'pd':pc2>0?'pw':'pn');
  sp.textContent=hdk==='Da ky'?'Da ky HD':pc2>0?pc2+'% hoan thanh':'Chua cap nhat';
  const ok=document.getElementById('ok_'+c);
  ok.style.display='inline';setTimeout(()=>{ok.style.display='none';},2200);
  if(document.getElementById('dv').style.display!=='none') buildDash();
}

function buildDash(){
  let done=0,doing=0,not_=0;
  PROV.forEach(p=>{
    const d=D[p.c]||{};
    if((d.hdk||'')==='Da ky')done++;
    else if(pct(d)>0)doing++;
    else not_++;
  });
  document.getElementById('dv').innerHTML=
    '<div class="sumrow">'
    +'<div class="sc"><div class="snum g">'+done+'</div><div class="sl">Da ky HD khung</div></div>'
    +'<div class="sc"><div class="snum a">'+doing+'</div><div class="sl">Dang trien khai</div></div>'
    +'<div class="sc"><div class="snum r">'+not_+'</div><div class="sl">Chua cap nhat</div></div>'
    +'<div class="sc"><div class="snum bl">20</div><div class="sl">Tong tinh/TP</div></div>'
    +'</div>'
    +'<div style="text-align:right;margin-bottom:8px"><button class="rbtn" onclick="loadAll()">Tai lai du lieu</button></div>'
    +'<div class="dtw"><table><thead><tr>'
    +'<th style="text-align:left;padding-left:14px">Tinh/TP</th>'
    +STEPS.map(s=>'<th>'+s.t+'</th>').join('')
    +'<th>Tien do</th><th>Ngay ky HD</th><th>Cap nhat luc</th><th>Ghi chu</th>'
    +'</tr></thead><tbody>'
    +PROV.map(p=>{
      const d=D[p.c]||{},pc2=pct(d);
      const upd=d._upd?new Date(d._upd).toLocaleDateString('vi-VN'):'—';
      return '<tr>'
        +'<td><span style="font-size:10px;color:'+(p.kv==='KV2'?'#27500A':'#0C447C')+';font-weight:700">['+p.kv+']</span> '+p.n+'</td>'
        +STEPS.map(s=>{
          const v=d[s.k]||'—',dt=d[s.k+'_d']||'';
          return '<td><span class="tp '+tcls(v)+'">'+v+'</span>'+(dt?'<span class="tdt">'+dt+'</span>':'')+'</td>';
        }).join('')
        +'<td><div class="pw2"><div class="pb"><div class="pf2" style="width:'+pc2+'%"></div></div><span class="pc">'+pc2+'%</span></div></td>'
        +'<td style="font-size:10px">'+(d.hdk_d||'—')+'</td>'
        +'<td style="font-size:10px;color:#bbb">'+upd+'</td>'
        +'<td style="font-size:10px;color:#888;max-width:110px">'+(d.note||'')+'</td>'
        +'</tr>';
    }).join('')
    +'</tbody></table></div>';
}

function sw(v){
  document.getElementById('bF').classList.toggle('active',v==='f');
  document.getElementById('bD').classList.toggle('active',v==='d');
  document.getElementById('fv').style.display=v==='f'?'block':'none';
  document.getElementById('dv').style.display=v==='d'?'block':'none';
  if(v==='d') buildDash();
}

const pf=document.getElementById('pf');
PROV.forEach(p=>{
  const o=document.createElement('option');
  o.value=p.c;o.textContent=p.n+' ('+p.c+')';
  pf.appendChild(o);
});
loadAll();
</script>
</body>
</html>
